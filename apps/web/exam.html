<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>English Test</title>
  <style>
    :root { --fg: #1d2430; --muted: #6b7480; --line: #e3e7ec; --bg: #f7f8fa;
            --accent: #2f6df6; --warn: #c2410c; --danger: #b91c1c; --ok: #046c4e; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 15px/1.5 system-ui, sans-serif; color: var(--fg);
           background: var(--bg); -webkit-user-select: none; user-select: none; }
    header { background: #fff; border-bottom: 1px solid var(--line); padding: 12px 20px;
             display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 5; }
    header h1 { font-size: 15px; margin: 0; }
    header .spacer { flex: 1; }
    main { max-width: 760px; margin: 20px auto; padding: 0 20px; }
    section { background: #fff; border: 1px solid var(--line); border-radius: 8px;
              padding: 20px; margin-bottom: 18px; }
    h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em;
         color: var(--muted); margin: 0 0 12px; }
    button { font: inherit; border: 1px solid var(--line); background: #fff;
             border-radius: 6px; padding: 8px 14px; cursor: pointer; }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button:disabled { opacity: .45; cursor: default; }
    .name-btn { display: block; width: 100%; text-align: left; margin: 6px 0; padding: 12px 14px; }
    .name-btn.done { opacity: .5; }
    .stimulus { background: var(--bg); border: 1px solid var(--line); border-radius: 6px;
                padding: 14px; margin-bottom: 16px; white-space: pre-wrap; }
    .prompt { font-weight: 600; margin: 0 0 12px; }
    .opt { display: block; margin: 8px 0; padding: 10px 12px; border: 1px solid var(--line);
           border-radius: 6px; cursor: pointer; }
    .opt input { margin-right: 8px; }
    input[type=text], textarea, select { font: inherit; width: 100%; padding: 9px 10px;
           border: 1px solid var(--line); border-radius: 6px; -webkit-user-select: text; user-select: text; }
    textarea { min-height: 140px; resize: vertical; }
    img.opt-img { max-width: 100%; border-radius: 4px; }
    .timer { font-variant-numeric: tabular-nums; font-weight: 600; padding: 4px 10px;
             border-radius: 6px; background: #eef1f5; }
    .timer.low { background: #fdecd6; color: var(--warn); }
    .timer.crit { background: #fde2e2; color: var(--danger); }
    .nav { display: flex; gap: 8px; align-items: center; }
    .nav .spacer { flex: 1; }
    .progress { color: var(--muted); font-size: 13px; }
    .muted { color: var(--muted); }
    .hidden { display: none; }
    .err { color: var(--danger); min-height: 18px; }
    .wordcount { color: var(--muted); font-size: 13px; margin-top: 6px; }
    .wordcount.ok { color: var(--ok); }
    .bullets { margin: 6px 0 12px; padding-left: 18px; color: var(--muted); }
    .done-screen { text-align: center; padding: 40px 20px; }
    .done-screen .big { font-size: 40px; }
  </style>
</head>
<body>
  <header class="hidden" id="examHeader">
    <h1 id="examTitle"></h1>
    <span class="spacer"></span>
    <span class="timer" id="timer">--:--</span>
  </header>

  <main>
    <!-- Pick-your-name landing -->
    <section id="pick">
      <h2>Choose your name to begin</h2>
      <div id="nameList"></div>
      <p class="muted" id="pickEmpty">No students on this test yet — ask your teacher.</p>
      <p class="err" id="pickErr"></p>
    </section>

    <!-- One-at-a-time runner -->
    <section id="runner" class="hidden">
      <div class="progress" id="progress"></div>
      <div id="stimulus"></div>
      <div id="question"></div>
      <p class="err" id="saveErr"></p>
      <div class="nav">
        <button id="prevBtn">Back</button>
        <span class="spacer"></span>
        <button id="nextBtn">Next</button>
        <button class="primary" id="submitBtn">Submit test</button>
      </div>
    </section>

    <!-- Finished -->
    <section id="done" class="hidden">
      <div class="done-screen">
        <div class="big" id="doneIcon">✓</div>
        <h2 id="doneTitle">Test submitted</h2>
        <p class="muted" id="doneMsg">Your answers have been recorded. You can close this tab.</p>
      </div>
    </section>
  </main>

  <script src="recorder.js"></script>
  <script src="exam.js"></script>
</body>
</html>
